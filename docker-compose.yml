version: '3.8'
services:
  mysql:
    image: mysql:5.7
    ports:
      - 3306:3306
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 'yes'
      MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
      MYSQL_USER: binkjsuser
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: binkjs
    volumes:
      - ./binkjs.sql:/docker-entrypoint-initdb.d/binkjs.sql
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
  minio:
    image: minio/minio:latest
    volumes:
      - minio-data:/data
      # - ./minio-init.sh:/minio-init.sh
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: miniopassword
      CONSOLE_MINIO_SERVER: http://minio:9000
    command: server /data --console-address :9001
    restart: unless-stopped
  create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MC_HOST_minio: http://minioadmin:$miniopassword@minio:9000
    entrypoint:
      - sh
      - -c
      - |
        until mc ls minio > /dev/null 2>&1; do
          sleep 0.5
        done

        mc mb myminio/binkjs
        mc anonymous set public myminio/binkjs
        echo "dummy" | mc pipe myminio/binkjs/public/dummy.txt

volumes:
  minio-data:
  mysql-data: